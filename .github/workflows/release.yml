name: Release

on:
  push:
    branches: [master]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Upgrade npm for trusted publishing (needs >= 11.5.1, Node 22 ships 10)
        run: npm install -g npm@11 && npm --version
      - name: Install headless-gl system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-utils xvfb libgl1-mesa-dri libglapi-mesa libosmesa6 build-essential libxi-dev libglu1-mesa-dev pkg-config
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: xvfb-run -a pnpm -r test
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
